# CI — 把「双引擎由 golden vectors 钉死一致」从口头契约变成机器契约:
# Rust 与 TS 两侧各自跑 protocol/vectors,任何只改一边的 PR 都过不了门禁;
# wasm job 保证被 workspace exclude 的 velocut-wasm 绑定至少编译不破。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust engine · golden vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo test

  web:
    name: TS engine · golden vectors + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc -b apps/editor

  wasm:
    name: wasm-pack build · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build crates/velocut-wasm --target web --release --out-dir ../../web/apps/editor/public/wasm
