# CI — turns "the two engines are pinned to agree via golden vectors" from a verbal
# contract into a machine contract: Rust and TS each run protocol/vectors, so any PR
# that changes only one side fails the gate; the wasm job ensures the workspace-excluded
# velocut-wasm bindings at least still compile.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust engine · golden vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo test

  web:
    name: TS engine · golden vectors + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc -b apps/editor

  wasm:
    name: wasm-pack build · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build crates/velocut-wasm --target web --release --out-dir ../../web/apps/editor/public/wasm
