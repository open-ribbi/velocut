# Weekly dependency update PRs for both ecosystems. Grouped to keep the PR
# count low for a single-maintainer project.
version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-all:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-all:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
